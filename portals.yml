# Portal Scanner Configuration — Singapore AI Market
# Targeting: AI/ML Engineer, AI Security Engineer, LLMOps, Agentic AI — Singapore, Jan 2027
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. ATS API (Greenhouse/Ashby/Lever) → structured JSON (fast)
#   3. WebSearch with site: filters (broad discovery, may be stale)

# -- Title filter --
title_filter:
  positive:
    # AI/ML core
    - "AI"
    - "ML"
    - "Machine Learning"
    - "LLM"
    - "Agent"
    - "Agentic"
    - "GenAI"
    - "Generative AI"
    - "NLP"
    - "LLMOps"
    - "MLOps"
    - "Applied AI"
    - "Artificial Intelligence"
    # AI Security (Dhruv's edge)
    - "AI Security"
    - "Security Engineer"
    - "Red Team"
    - "Adversarial"
    - "Cybersecurity"
    # Data & Research
    - "Data Scientist"
    - "Research Scientist"
    - "Research Engineer"
    - "Deep Learning"
    - "Computer Vision"
    # Engineering with AI focus
    - "Platform Engineer"
    - "Solutions Architect"
    - "Solutions Engineer"
    - "Forward Deployed"
    - "AI Engineer"
    - "ML Engineer"
    - "Software Engineer"    # broad but paired with company context
    # Product
    - "Product Manager"
    - "Technical PM"
  negative:
    - "Junior"
    - "Intern"
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
    - "Salesforce Admin"
    - "UI/UX"
    - "Graphic Design"
    - "Content Writer"
    - "HR "
    - "Finance Analyst"
    - "Accountant"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head of"
    - "Director"
    - "Mid-level"

# -- Search queries — Singapore focus --
search_queries:

  # -- Singapore-specific boards --
  - name: NodeFlair — AI/ML Singapore
    query: 'site:nodeflair.com/jobs "AI" OR "ML" OR "Machine Learning" OR "LLM" Singapore 2026'
    enabled: true

  - name: NodeFlair — AI Security Singapore
    query: 'site:nodeflair.com/jobs "AI Security" OR "Security Engineer" OR "MLSec" Singapore'
    enabled: true

  - name: MyCareersFuture — AI Engineer
    query: 'site:mycareersfuture.gov.sg "AI Engineer" OR "Machine Learning" OR "LLM" Singapore'
    enabled: true

  - name: MyCareersFuture — AI Security
    query: 'site:mycareersfuture.gov.sg "AI Security" OR "Cybersecurity" OR "Security Engineer" Singapore'
    enabled: true

  - name: Tech in Asia — Singapore AI roles
    query: 'site:techinasia.com "AI" OR "ML Engineer" OR "Data Scientist" Singapore jobs 2026'
    enabled: true

  - name: Jobstreet Singapore — AI/ML
    query: 'site:jobstreet.com.sg "AI Engineer" OR "Machine Learning" OR "LLM" OR "Data Scientist" Singapore'
    enabled: true

  # -- Global AI boards with Singapore listings --
  - name: Greenhouse — AI Engineer Singapore
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI Engineer" OR "ML Engineer" Singapore'
    enabled: true

  - name: Greenhouse — AI Security Singapore
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Security" "AI" Singapore'
    enabled: true

  - name: Ashby — AI roles Singapore
    query: 'site:jobs.ashbyhq.com "AI" OR "LLM" OR "ML" Singapore'
    enabled: true

  - name: Lever — AI roles Singapore
    query: 'site:jobs.lever.co "AI Engineer" OR "ML Engineer" OR "Data Scientist" Singapore'
    enabled: true

  - name: LinkedIn Jobs — AI Singapore (via Google)
    query: 'site:linkedin.com/jobs "AI Engineer" OR "ML Engineer" OR "LLM" Singapore 2026'
    enabled: true

  # -- Global AI companies (remote-friendly or with SG offices) --
  - name: YC Jobs — Applied AI Singapore / Asia
    query: 'site:workatastartup.com "AI Engineer" OR "Applied AI" OR "ML" Singapore OR Asia'
    enabled: true

  - name: ai-jobs.net — Singapore / Asia
    query: 'site:ai-jobs.net "AI" OR "ML" Singapore OR Asia OR APAC'
    enabled: true

  - name: Himalayas — AI Engineer APAC
    query: 'site:himalayas.app "AI Engineer" OR "ML Engineer" OR "LLMOps" Singapore OR APAC'
    enabled: true

  # -- Research & deep tech --
  - name: Anthropic / OpenAI Singapore
    query: '"AI Engineer" OR "Research Engineer" OR "Applied AI" site:openai.com/careers OR site:anthropic.com/careers Singapore OR APAC'
    enabled: true

